name: Daily tag

on:
  schedule:
    # Every day at 03:00 UTC (08:30 IST). Runs before the Monday scrape so
    # the Monday xlsx already has fresh tags from the previous days.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write   # needed so the action can commit docs/index.html back

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tagger
        env:
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python tag.py

      - name: Build dashboard
        if: always()
        env:
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python make_dashboard.py

      - name: Build public site
        if: always()
        env:
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python make_site.py

      - name: Commit and push docs/
        if: always()
        run: |
          if [[ -d docs ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/
            if git diff --staged --quiet; then
              echo "No changes in docs/"
            else
              git commit -m "Refresh dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
              git push
            fi
          else
            echo "docs/ not generated, skipping commit"
          fi
